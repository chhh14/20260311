<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>個人履歷</title>

<style>
body{
  margin:0;
  font-family:"Microsoft JhengHei";
  background:#f2f2f2;
}

/* 上方區塊 */
.header{
  background:#dcdcdc;
  padding:40px 20px;
  display:flex;
  align-items:center;
  gap:30px;
}

.photo{
  width:120px;
  height:120px;
  border-radius:50%;
  overflow:hidden;
  background:#eee;
}

.photo img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.header-text h1{
  margin:0;
  font-size:32px;
}

.header-text p{
  margin:5px 0 0;
  color:#555;
}

/* 主體 */
.container{
  display:flex;
  flex-direction:column; /* 改成直式 */
}

.left{
  width:100%;
  background:#ffffff;
  padding:20px;
  border-bottom:1px solid #ccc;
}

.right{
  width:100%;
  padding:20px;
}

.section{
  margin-bottom:25px;
}

.title{
  font-weight:bold;
  border-bottom:2px solid #333;
  padding-bottom:5px;
  margin-bottom:10px;
}

p{
  margin:5px 0;
  font-size:14px;
}

/* 作品 */
button{
  margin-top:10px;
  padding:6px 12px;
  border:none;
  background:#333;
  color:white;
  cursor:pointer;
}

.gallery{
  display:none;
  margin-top:10px;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.gallery img{
  width:100%;
  height:100px;
  object-fit:cover;
}

/* 音樂按鈕 */
.music-btn{
  position:fixed;
  bottom:20px;
  right:20px;
  padding:10px 15px;
  background:#333;
  color:#fff;
  border:none;
}

</style>
</head>

<body>

<div class="header">
  <div class="photo">
    <img src="images/photo.jpg?v=1">
  </div>
  <div class="header-text">
    <h1>張辰熙</h1>
    <p>亞洲大學 AI 系學生</p>
  </div>
</div>

<div class="container">

<div class="left">

<div class="section">
<div class="title">基本資料</div>
<p>亞洲大學｜人工智慧學系</p>
<p>學號：114022092</p>
<p>Email：cz695799@gmail.com</p>
</div>

<div class="section">
<div class="title">技能</div>
<p>Word / Excel / PPT</p>
<p>HTML / CSS</p>
<p>資料處理</p>
<p>會計人工記帳</p>
</div>

<div class="section">
<div class="title">興趣</div>
<p>自學甜點製作（細節與耐心）</p>

<button onclick="toggleGallery()">查看作品</button>

<div id="gallery" class="gallery">
<img src="images/dessert1.jpeg">
<img src="images/dessert2.jpg">
<img src="images/dessert3.jpg">
<img src="images/dessert4.jpg">
</div>

</div>

</div>

<div class="right">

<div class="section">
<div class="title">自我介紹</div>
<p>對 AI 與資料分析有興趣，具備自學能力與耐心，並透過甜點製作培養細節掌控。</p>
</div>

<div class="section">
<div class="title">學習經歷</div>
<p>學習 Python、機器學習與資料分析</p>
</div>

<div class="section">
<div class="title">專案</div>
<p>AI 小專案</p>
<p>個人網站</p>
</div>

<div class="section">
<div class="title">未來目標</div>
<p>朝 AI / 資料分析領域發展</p>
</div>

</div>

</div>

<audio id="bgm" loop>
<source src="audio/music.mp3" type="audio/mpeg">
</audio>

<button class="music-btn" onclick="toggleMusic()">▶ 播放音樂</button>

<script>
function toggleGallery(){
  const g=document.getElementById("gallery");
  g.style.display = g.style.display === "grid" ? "none" : "grid";
}

const audio=document.getElementById("bgm");
const btn=document.querySelector(".music-btn");

function toggleMusic(){
  if(audio.paused){
    audio.play();
    btn.innerText="⏸ 暫停音樂";
  }else{
    audio.pause();
    btn.innerText="▶ 播放音樂";
  }
}
</script>

</body>
</html>
