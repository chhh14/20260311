<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>個人履歷</title>
  <style>
    body {
      margin: 0;
      font-family: "Microsoft JhengHei", sans-serif;
      background: #f2f2f2;
    }
    .header {
      background: #3b4455;
      color: white;
      padding: 40px 60px;
      display: flex;
      align-items: center;
      gap: 30px;
    }
    .photo {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      overflow: hidden;
      background: #fff;
    }
    .photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .header-info h1 {
      margin: 0;
      font-size: 32px;
    }
