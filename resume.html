<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>個人履歷</title>

  <style>
    body {
      margin: 0;
      font-family: "Microsoft JhengHei", sans-serif;
      background: #f2f2f2;
    }

    .header {
      background: #3b4455;
      color: white;
      padding: 40px 60px;
      display: flex;
      align-items: center;
      gap: 30px;
    }

    .photo {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      overflow: hidden;
      background: white;
    }

    .photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .container {
      padding: 40px 60px;
      display: flex;
      gap: 50px;
    }

    .left { width: 35%; }
    .right { width: 65%; }

    .section-title {
      background: #e0e0e0;
      padding: 8px 12px;
      font-weight: bold;
      margin-top: 25px;
      border-left: 5px solid #3b4455;
    }

    .text-block p {
      margin: 6px 0;
      line-height: 1.7;
    }
  </style>
</head>

<body>

  <div class="header">
    <div class="photo">
      <img src="images/photo.jpg">
    </div>
