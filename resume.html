<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>個人履歷</title>

<style>
    body {
        margin: 0;
        font-family: "Microsoft JhengHei", sans-serif;
        background: #e7eaf0;
    }

    .resume {
        width: 900px;
        margin: 40px auto;
        display: flex;
        background: white;
        box-shadow: 0 0 20px rgba(0,0,0,0.1);
    }

    /* 左側欄 */
    .left {
        width: 32%;
        background: #1f2738;
        color: white;
        padding: 40px 30px;
    }

    .photo {
        width: 150px;
        height: 150px;
        border-radius: 50%;
        overflow: hidden;
        margin: auto;
    }

    .photo img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .info {
        margin-top: 20px;
        font-size: 14px;
        line-height: 1.9;
    }

    .left h3 {
        margin-top: 30px;
        border-bottom: 1px solid #ffffff55;
        padding-bottom: 6px;
        font-size: 16px;
    }

    .skills, .self {
        margin-top: 20px;
        font-size: 14px;
    }

    /* 右側欄 */
    .right {
        width: 68%;
        padding: 50px;
    }

    .name-title h1 {
        margin: 0;
        font-size: 36px;
        letter-spacing: 2px;
    }

    .name-title p {
        margin: 5px 0 0 0;
        color: #666;
        letter-spacing: 3px;
    }
</style>
</head>
<body>

<div class="resume">

    <!-- 左欄 -->
    <div class="left">

        <div class="photo">
            <images>
            <photo class="photo.jpg">照片</photo>
            </images>
        </div>

        <div class="info">
            <p>學校：亞洲大學</p>
            <p>學號：114022092</p>
            <p>科系：人工智慧學系</p>
            <p>Email：cz695799@gmail.com</p>
        </div>

        <h3>技能</h3>
        <div class="skills">
            <p>Python、HTML / CSS、JavaScript、Machine Learning、資料分析、AI 基礎</p>
        </div>

        <h3>自我評價</h3>
        <div class="self">
            <p>具備細膩觀察力、創意能力，積極學習與提升自我。</p>
        </div>
    </div>

    <!-- 右欄：保持簡潔 -->
    <div class="right">
        <div class="name-title">
            <h1>張辰熙</h1>
            <p>亞洲大學 AI系學生</p>
        </div>
    </div>

</div>

</body>
</html>
