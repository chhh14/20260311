<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>個人履歷</title>

  <style>
    body {
      margin: 0;
      font-family: "Microsoft JhengHei", sans-serif;
      background: linear-gradient(135deg, #eef2f7, #dfe6f1);
    }

    .header {
      background: linear-gradient(135deg, #3b4455, #5a6a85);
      color: white;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .photo {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      overflow: hidden;
      border: 4px solid rgba(255,255,255,0.6);
    }

    .photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .container {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.08);
    }

    .section-title {
      font-weight: bold;
      margin-bottom: 10px;
      font-size: 15px;
      color: #3b4455;
      border-left: 4px solid #3b4455;
      padding-left: 8px;
    }

    .text-block p {
      margin: 5px 0;
      line-height: 1.6;
      font-size: 14px;
      color: #444;
    }

    button {
      padding: 8px 14px;
      border: none;
      border-radius: 8px;
      background: #5a6a85;
      color: white;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #3b4455;
    }

    /* 🍰 作品圖片 */
    .gallery {
      display: none;
      margin-top: 10px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .gallery img {
      width: 100%;
      border-radius: 10px;
      height: 120px;
      object-fit: cover;
      box-shadow: 0 3px 8px rgba(0,0,0,0.2);
      transition: transform 0.2s;
    }

    .gallery img:hover {
      transform: scale(1.05);
    }

    @media (min-width: 768px) {
      .container {
        flex-direction: row;
      }
      .left { width: 35%; }
      .right { width: 65%; }
    }
  </style>
</head>

<body>

  <div class="header">
    <div class="photo">
      <img src="images/photo.jpg?v=1">
    </div>
    <h1>張辰熙</h1>
    <p>亞洲大學 AI 系學生</p>
  </div>

  <div class="container">

    <div class="card left">
      <div class="section-title">基本資料</div>
      <div class="text-block">
        <p>亞洲大學｜人工智慧學系</p>
        <p>學號：114022092</p>
        <p>Email：cz695799@gmail.com</p>
      </div>

      <div class="section-title">技能</div>
      <div class="text-block">
        <p>Word / Excel / PPT</p>
        <p>HTML / CSS</p>
        <p>資料處理</p>
        <p>會計人工記帳</p>
      </div>

      <div class="section-title">興趣</div>
      <div class="text-block">
        <p>自學甜點製作（細節與耐心）</p>

        <button onclick="toggleGallery()">🍰 查看作品</button>

        <div id="gallery" class="gallery">
           <div class="gallery-item">
            <img src="images/dessert1.jpeg">
            <div class="overlay">可頌</div>
          </div>
          <div class="gallery-item">
            <img src="images/dessert2.jpg">
            <div class="overlay">蛋糕</div>
          </div>
          <div class="gallery-item">
            <img src="images/dessert3.jpg">
            <div class="overlay">泡芙</div>
          </div>
          <div class="gallery-item">
            <img src="images/dessert4.jpg">
            <div class="overlay">餅乾</div>
          </div>
        </div>
      </div>
    </div>

    <div class="card right">
      <div class="section-title">自我介紹</div>
      <div class="text-block">
        <p>對 AI 與資料分析有興趣，具備自學能力與耐心，並透過甜點製作培養細節掌控。</p>
      </div>

      <div class="section-title">學習經歷</div>
      <div class="text-block">
        <p>學習 Python、機器學習與資料分析</p>
      </div>

      <div class="section-title">專案</div>
      <div class="text-block">
        <p>AI 小專案</p>
        <p>個人網站</p>
      </div>

      <div class="section-title">未來目標</div>
      <div class="text-block">
        <p>朝 AI / 資料分析領域發展</p>
      </div>
    </div>

  </div>

  <script>
    function toggleGallery() {
      const g = document.getElementById("gallery");
      if (g.style.display === "grid") {
        g.style.display = "none";
      } else {
        g.style.display = "grid";
      }
    }
  </script>

</body>
</html>
