<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>個人履歷</title>

<style>
    body {
        margin: 0;
        font-family: "Microsoft JhengHei", sans-serif;
        background: #f2f2f2;
    }

    .header {
        background: #3b4455;
        color: white;
        padding: 40px 60px;
        display: flex;
        align-items: center;
        gap: 30px;
    }

    .photo {
        width: 140px;
        height: 140px;
        border-radius: 50%;
        overflow: hidden;
        background: #fff;
    }
    .photo img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .header-info h1 {
        margin: 0;
        font-size: 32px;
    }
    .header-info p {
        margin: 8px 0 0;
        font-size: 15px;
        letter-spacing: 2px;
    }

    .container {
        padding: 40px 60px;
        display: flex;
        gap: 50px;
    }

    .left {
        width: 35%;
    }

    .right {
        width: 65%;
    }

    .section-title {
        background: #e0e0e0;
        padding: 8px 12px;
        font-weight: bold;
        margin-top: 25px;
        border-left: 5px solid #3b4455;
    }

    .text-block p {
        margin: 6px 0;
        line-height: 1.7;
    }

    /* 播放按鈕 */
    .music-btn {
        position: fixed;
        bottom: 20px;
        right: 20px;
        padding: 10px 15px;
        border: none;
        border-radius: 20px;
        background: #3b4455;
        color: white;
        cursor: pointer;
    }
</style>
</head>
<body>

<div class="header">
    <div class="photo">
        <img src="images/photo.jpg">
    </div>

    <div class="header-info">
        <h1>張辰熙</h1>
        <p>亞洲大學 AI系 學生</p>
    </div>
</div>

<div class="container">

    <div class="left">
        <div class="section-title">基本資料</div>
        <div class="text-block">
            <p>學校：亞洲大學</p>
            <p>學號：114022092</p>
            <p>科系：人工智慧學系</p>
            <p>Email：cz695799@gmail.com</p>
        </div>

        <div class="section-title">技能</div>
        <div class="text-block">
            <p>Python、HTML / CSS、JavaScript</p>
            <p>Machine Learning、資料分析、AI基礎</p>
        </div>

        <div class="section-title">自我評價</div>
        <div class="text-block">
            <p>具備細膩觀察力、創意能力，積極學習與提升自我。</p>
        </div>
    </div>

    <div class="right">
        <div class="section-title">學習經歷</div>
        <div class="text-block">
            <p>目前就讀於亞洲大學人工智慧學系。</p>
            <p>對 AI 技術、程式設計與資料分析有高度興趣。</p>
            <p>持續學習 Python、機器學習與網頁開發。</p>
        </div>

        <div class="section-title">作品 / 專案</div>
        <div class="text-block">
            <p>AI 小專案（機器學習練習）</p>
            <p>個人網站</p>
            <p>資料分析練習</p>
        </div>
    </div>

</div>

<!-- 音樂 -->
<audio id="bgm" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<button class="music-btn" onclick="playMusic()">播放音樂</button>

<script>
function playMusic() {
  const audio = document.getElementById("bgm");
  audio.play();
}
</script>

</body>
</html>
