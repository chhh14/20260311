<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>個人履歷</title>

  <style>
    body {
      margin: 0;
      font-family: "Microsoft JhengHei", sans-serif;
      background: #f2f2f2;
    }

    .header {
      background: #3b4455;
      color: white;
      padding: 40px 60px;
      display: flex;
      align-items: center;
      gap: 30px;
    }

    .photo {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      overflow: hidden;
      background: white;
    }

    .photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .container {
      padding: 40px 60px;
      display: flex;
      gap: 50px;
    }

    .left { width: 35%; }
    .right { width: 65%; }

    .section-title {
      background: #e0e0e0;
      padding: 8px 12px;
      font-weight: bold;
      margin-top: 25px;
      border-left: 5px solid #3b4455;
    }

    .text-block p {
      margin: 6px 0;
      line-height: 1.7;
    }

    /* 播放按鈕樣式 */
    .music-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #3b4455;
      color: white;
      border: none;
      padding: 12px 18px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
    }

    .music-btn:hover {
      background: #2a3240;
    }
  </style>
</head>

<body>

  <div class="header">
    <div class="photo">
      <img src="images/photo.jpg">
    </div>
    <div>
      <h1>張辰熙</h1>
      <p>亞洲大學 AI 系學生</p>
    </div>
  </div>

  <div class="container">
    <div class="left">
      <div class="section-title">基本資料</div>
      <div class="text-block">
        <p>學校：亞洲大學</p>
        <p>學號：114022092</p>
        <p>科系：人工智慧學系</p>
        <p>Email：cz695799@gmail.com</p>
      </div>

      <div class="section-title">技能</div>
      <div class="text-block">
        <p>Python、HTML / CSS、JavaScript</p>
        <p>Machine Learning、資料分析</p>
      </div>
    </div>

    <div class="right">
      <div class="section-title">學習經歷</div>
      <div class="text-block">
        <p>目前就讀於亞洲大學人工智慧學系。</p>
        <p>對 AI 技術、程式設計與資料分析具有高度興趣。</p>
      </div>

      <div class="section-title">作品 / 專案</div>
      <div class="text-block">
        <p>AI 小專案（機器學習應用）</p>
        <p>個人網站</p>
        <p>資料分析練習</p>
      </div>
    </div>
  </div>

  <!-- 🎵 音樂 -->
  <audio id="bgm" loop>
    <source src="music/music.mp3" type="audio/mpeg">
  </audio>

  <!-- 🎮 控制按鈕 -->
  <button class="music-btn" onclick="toggleMusic()">▶ 播放音樂</button>

  <script>
    const audio = document.getElementById("bgm");
    const btn = document.querySelector(".music-btn");

    function toggleMusic() {
      if (audio.paused) {
        audio.play();
        btn.innerText = "⏸ 暫停音樂";
      } else {
        audio.pause();
        btn.innerText = "▶ 播放音樂";
      }
    }
  </script>

</body>
</html>
