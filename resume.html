<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>個人履歷</title>

  <style>
    body {
      margin: 0;
      font-family: "Microsoft JhengHei", sans-serif;
      background: #f2f2f2;
    }

    .header {
      background: #3b4455;
      color: white;
      padding: 40px 60px;
      display: flex;
      align-items: center;
      gap: 30px;
    }

    .photo {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      overflow: hidden;
      background: white;
    }

    .photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .container {
      padding: 40px 60px;
      display: flex;
      gap: 50px;
    }

    .left { width: 35%; }
    .right { width: 65%; }

    .section-title {
      background: #e0e0e0;
      padding: 8px 12px;
      font-weight: bold;
      margin-top: 25px;
      border-left: 5px solid #3b4455;
    }

    .text-block p {
      margin: 6px 0;
      line-height: 1.7;
    }
  </style>
</head>

<body>

  <div class="header">
    <div class="photo">
      <img src="images/photo.jpg">
    </div>
    <div>
      <h1>張辰熙</h1>
      <p>亞洲大學 AI 學生</p>
    </div>
  </div>

  <div class="container">
    <div class="left">
      <div class="section-title">基本資料</div>
      <div class="text-block">
        <p>學校：亞洲大學</p>
        <p>學號：114022092</p>
        <p>科系：人工智慧學系</p>
        <p>Email：cz695799@gmail.com</p>
      </div>

      <div class="section-title">技能</div>
      <div class="text-block">
        <p>Python、HTML/CSS、JavaScript</p>
        <p>AI / ML 基礎、資料分析</p>
      </div>
    </div>

    <div class="right">
      <div class="section-title">學習經歷</div>
      <div class="text-block">
        <p>亞洲大學人工智慧學系學生</p>
        <p>持續學習 AI、程式、資料分析</p>
      </div>

      <div class="section-title">作品 / 專案</div>
      <div class="text-block">
        <p>AI 小專案</p>
        <p>個人網站</p>
        <p>資料分析練習</p>
      </div>
    </div>
  </div>

  <!-- 🔊 背景音樂 -->
  <audio id="bgm" autoplay loop playsinline muted>
    music.mp3
  </audio>

  <script>
    const audio = document.getElementById("bgm");

    // Chrome 自動播放（需要靜音）
    audio.play().then(() => {
      setTimeout(() => {
        audio.muted = false;
      }, 300);
    }).catch(() => {
      // 如果被限制，第一次點擊後播放
      window.addEventListener("click", () => {
        audio.muted = false;
        audio.play();
      }, { once: true });
    });
  </script>

</body>
</html>
